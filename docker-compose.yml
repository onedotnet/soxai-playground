services:
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - playground_redis:/data

  api:
    build:
      context: api
    ports:
      - "8100:8100"
    environment:
      PLAYGROUND_REDIS_URL: redis://redis:6379/1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis

volumes:
  playground_redis:
