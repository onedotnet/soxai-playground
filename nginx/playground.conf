# Nginx config for SoxAI Playground preview proxying.
# Handles *.play.soxai.io → Docker container port mapping.
#
# Requires: wildcard SSL cert for *.play.soxai.io (Cloudflare)

# Map session ID from subdomain to upstream port.
# This is dynamically managed by the API server via a Lua script or
# a simple upstream config file that gets reloaded.

map $host $playground_port {
    # This file is auto-generated by the playground API.
    # Format: {session_id}.play.soxai.io → port
    include /etc/nginx/playground-upstreams.conf;
    default 0;
}

server {
    listen 443 ssl;
    server_name *.play.soxai.io;

    # Wildcard SSL (Cloudflare origin cert)
    ssl_certificate     /etc/nginx/ssl/play.soxai.io.pem;
    ssl_certificate_key /etc/nginx/ssl/play.soxai.io.key;

    # Extract session ID from subdomain
    set $session_id "";
    if ($host ~* "^([a-z0-9]+)\.play\.soxai\.io$") {
        set $session_id $1;
    }

    location / {
        # Reject if no valid session or port mapping
        if ($playground_port = 0) {
            return 404;
        }

        proxy_pass http://127.0.0.1:$playground_port;
        proxy_http_version 1.1;

        # WebSocket support (for HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 3600s;  # Long for WebSocket
        proxy_send_timeout 3600s;
    }
}
